<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Récipes — Share What You Cook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design tokens ─────────────────────────────────────────────── */
    :root {
      --cream:   #f7f3ec;
      --paper:   #fffdf8;
      --ink:     #1a1612;
      --muted:   #7a6f65;
      --rust:    #c94f2c;
      --rust-lt: #f0d5cc;
      --sage:    #4a7c59;
      --gold:    #c9983a;
      --border:  #e0d8ce;
      --shadow:  0 2px 16px rgba(26,22,18,.08);
      --r:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ─── Nav ───────────────────────────────────────────────────────── */
    nav {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky; top: 0; z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--rust);
      text-decoration: none;
      font-style: italic;
    }

    .nav-links { display: flex; gap: 1rem; align-items: center; }

    .nav-links a, .btn-ghost {
      text-decoration: none;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 500;
      padding: .4rem .8rem;
      border-radius: 6px;
      transition: background .15s, color .15s;
      border: none;
      background: none;
      cursor: pointer;
    }
    .nav-links a:hover, .btn-ghost:hover { background: var(--cream); color: var(--ink); }

    .btn-primary {
      background: var(--rust);
      color: #fff;
      border: none;
      padding: .55rem 1.2rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ─── Hero ──────────────────────────────────────────────────────── */
    .hero {
      background: var(--ink);
      color: var(--cream);
      padding: 5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 700;
      position: relative;
      line-height: 1.15;
    }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero p {
      margin: 1rem auto 2rem;
      max-width: 520px;
      color: #b0a898;
      font-size: 1.05rem;
      line-height: 1.6;
      position: relative;
    }

    /* ─── Filter tabs ───────────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: .5rem;
      padding: 1.5rem 2rem;
      overflow-x: auto;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      white-space: nowrap;
      padding: .4rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff;
    }

    /* ─── Recipe grid ───────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--paper);
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(26,22,18,.14); }

    .card-image {
      width: 100%; height: 200px;
      object-fit: cover;
      display: block;
      background: var(--cream);
    }
    .card-image-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, var(--rust-lt), var(--cream));
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
    }

    .card-body { padding: 1.2rem; }
    .card-category {
      font-size: .75rem;
      font-weight: 500;
      color: var(--rust);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      line-height: 1.3;
      margin-bottom: .4rem;
    }
    .card-desc {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      gap: 1rem;
      margin-top: .9rem;
      padding-top: .9rem;
      border-top: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
    }
    .card-meta span { display: flex; align-items: center; gap: .3rem; }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--ink);
      margin-bottom: .5rem;
    }

    /* ─── Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(26,22,18,.6);
      z-index: 200;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--paper);
      border-radius: var(--r);
      max-width: 680px;
      width: 100%;
      margin: auto;
      overflow: hidden;
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.96) translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.4rem; line-height: 1;
      padding: .2rem .5rem;
      border-radius: 6px;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--cream); }

    .modal-body { padding: 1.5rem; }

    /* ─── Recipe detail view ────────────────────────────────────────── */
    .detail-image {
      width: 100%; height: 280px;
      object-fit: cover; display: block;
    }
    .detail-image-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, var(--rust-lt), var(--cream));
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
    }
    .detail-category {
      font-size: .8rem; font-weight: 500;
      color: var(--rust); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: .4rem;
    }
    .detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; line-height: 1.2;
      margin-bottom: .6rem;
    }
    .detail-meta {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      margin-bottom: 1.2rem;
      font-size: .85rem; color: var(--muted);
    }
    .detail-meta span { display: flex; align-items: center; gap: .3rem; }

    .section-label {
      font-size: .75rem; font-weight: 500;
      color: var(--rust); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: .6rem;
    }
    .ingredients-list {
      list-style: none; margin-bottom: 1.5rem;
    }
    .ingredients-list li {
      padding: .4rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
      display: flex; align-items: flex-start; gap: .6rem;
    }
    .ingredients-list li::before {
      content: '·';
      color: var(--rust); font-weight: 700; flex-shrink: 0;
    }
    .steps-list { list-style: none; margin-bottom: 1.5rem; }
    .steps-list li {
      display: flex; gap: 1rem;
      margin-bottom: 1rem; font-size: .9rem; line-height: 1.6;
    }
    .step-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      background: var(--rust); color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; margin-top: .1rem;
    }

    .detail-actions {
      display: flex; gap: .8rem;
      padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .btn-danger {
      background: #fee2e2; color: #dc2626;
      border: none; padding: .55rem 1.2rem;
      border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 500;
      transition: background .15s;
    }
    .btn-danger:hover { background: #fca5a5; }

    /* ─── Form ──────────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group.full { grid-column: 1/-1; }

    label {
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink);
    }

    input[type=text], input[type=number], select, textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      padding: .6rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      transition: border-color .15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--rust);
    }
    textarea { resize: vertical; min-height: 90px; }

    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--rust); background: var(--rust-lt); }
    .image-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .image-upload-area p { font-size: .85rem; color: var(--muted); margin-top: .3rem; }
    #upload-preview {
      max-width: 100%; max-height: 150px;
      border-radius: 6px; margin-top: .8rem;
      display: none;
    }

    .form-actions {
      display: flex; gap: .8rem; justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* ─── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--cream);
      padding: .8rem 1.5rem;
      border-radius: 999px;
      font-size: .9rem;
      z-index: 9999;
      animation: toastIn .3s ease;
      pointer-events: none;
    }
    .toast.success { background: var(--sage); }
    .toast.error   { background: #dc2626; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ─── Loading ───────────────────────────────────────────────────── */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--rust);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 3rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      .hero { padding: 3rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── Nav ─────────────────────────────────────────────────────────────── -->
<nav>
  <a class="nav-logo" href="/">Récipes</a>
  <div class="nav-links">
    <button class="btn-primary" onclick="openAddModal()">+ Add Recipe</button>
  </div>
</nav>

<!-- ── Hero ────────────────────────────────────────────────────────────── -->
<div class="hero">
  <h1>Share What You <em>Cook</em></h1>
  <p>A community cookbook — add your favourite recipes, discover new ones, and inspire the people around you.</p>
  <button class="btn-primary" onclick="openAddModal()" style="font-size:1rem;padding:.7rem 1.8rem;">Share a Recipe</button>
</div>

<!-- ── Category filters ─────────────────────────────────────────────────── -->
<div class="filters">
  <button class="filter-btn active" data-category="">All Recipes</button>
  <button class="filter-btn" data-category="Breakfast">🍳 Breakfast</button>
  <button class="filter-btn" data-category="Lunch">🥗 Lunch</button>
  <button class="filter-btn" data-category="Dinner">🍽️ Dinner</button>
  <button class="filter-btn" data-category="Dessert">🍰 Dessert</button>
  <button class="filter-btn" data-category="Snacks">🥨 Snacks</button>
  <button class="filter-btn" data-category="Drinks">🍹 Drinks</button>
</div>

<!-- ── Recipe grid ──────────────────────────────────────────────────────── -->
<div class="container">
  <div class="grid" id="recipe-grid">
    <div class="empty-state" style="grid-column:1/-1">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- DETAIL MODAL -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" id="detail-content"><!-- filled by JS --></div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- ADD / EDIT MODAL -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="form-title">Add a Recipe</h2>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Recipe Title *</label>
          <input type="text" id="f-title" placeholder="e.g. Grandma's Lasagna" required />
        </div>
        <div class="form-group full">
          <label>Short Description</label>
          <input type="text" id="f-description" placeholder="One-sentence teaser..." />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="f-category">
            <option value="">— Select —</option>
            <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
            <option>Dessert</option><option>Snacks</option><option>Drinks</option>
          </select>
        </div>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="f-author" placeholder="e.g. Maria" />
        </div>
        <div class="form-group">
          <label>Prep Time (min)</label>
          <input type="number" id="f-prep" placeholder="15" min="0" />
        </div>
        <div class="form-group">
          <label>Cook Time (min)</label>
          <input type="number" id="f-cook" placeholder="30" min="0" />
        </div>
        <div class="form-group">
          <label>Servings</label>
          <input type="number" id="f-servings" placeholder="4" min="1" />
        </div>
        <div class="form-group full">
          <label>Ingredients * <small style="color:var(--muted)">(one per line)</small></label>
          <textarea id="f-ingredients" rows="5" placeholder="2 cups flour&#10;1 tsp salt&#10;3 large eggs"></textarea>
        </div>
        <div class="form-group full">
          <label>Steps * <small style="color:var(--muted)">(one per line)</small></label>
          <textarea id="f-steps" rows="6" placeholder="Mix dry ingredients&#10;Add eggs and stir&#10;Bake at 180°C for 30 min"></textarea>
        </div>
        <div class="form-group full">
          <label>Photo</label>
          <div class="image-upload-area">
            <input type="file" id="f-image" accept="image/*" onchange="previewImage(this)" />
            <div>📷</div>
            <p>Click to upload a photo</p>
            <img id="upload-preview" src="" alt="preview" />
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-ghost" onclick="closeFormModal()">Cancel</button>
        <button class="btn-primary" onclick="submitForm()">Save Recipe</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════ -->
<!-- JAVASCRIPT -->
<!-- ══════════════════════════════════════════════════════════════════════ -->
<script>
const API = '/api/recipes';
let editingId = null;
let activeCategory = '';

const EMOJIS = {
  Breakfast:'🍳', Lunch:'🥗', Dinner:'🍽️', Dessert:'🍰',
  Snacks:'🥨', Drinks:'🍹', '':'🍴'
};

/* ── Fetch & render recipes ────────────────────────────────────────── */
async function loadRecipes(category = '') {
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '<div style="grid-column:1/-1"><div class="spinner"></div></div>';
  try {
    const url = category ? `${API}/?category=${encodeURIComponent(category)}` : `${API}/`;
    const recipes = await fetch(url).then(r => r.json());
    renderGrid(recipes);
  } catch {
    grid.innerHTML = '<div class="empty-state"><h3>Could not load recipes</h3><p>Make sure the backend is running.</p></div>';
  }
}

function renderGrid(recipes) {
  const grid = document.getElementById('recipe-grid');
  if (!recipes.length) {
    grid.innerHTML = `<div class="empty-state">
      <h3>No recipes yet!</h3>
      <p>Be the first to add one 👇</p>
      <br><button class="btn-primary" onclick="openAddModal()">+ Add Recipe</button>
    </div>`;
    return;
  }
  grid.innerHTML = recipes.map((r, i) => `
    <div class="card" style="animation-delay:${i * 0.06}s" onclick="openDetail(${r.id})">
      ${r.image_url
        ? `<img class="card-image" src="${r.image_url}" alt="${r.title}" loading="lazy" />`
        : `<div class="card-image-placeholder">${EMOJIS[r.category] || '🍴'}</div>`}
      <div class="card-body">
        ${r.category ? `<div class="card-category">${r.category}</div>` : ''}
        <div class="card-title">${r.title}</div>
        ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
        <div class="card-meta">
          ${r.prep_time ? `<span>⏱ ${r.prep_time + (r.cook_time||0)} min</span>` : ''}
          ${r.servings  ? `<span>🍽 ${r.servings} servings</span>` : ''}
          ${r.author    ? `<span>👤 ${r.author}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
}

/* ── Detail modal ──────────────────────────────────────────────────── */
async function openDetail(id) {
  const overlay = document.getElementById('detail-modal');
  const content = document.getElementById('detail-content');
  overlay.classList.add('open');
  content.innerHTML = '<div class="spinner" style="margin:2rem auto"></div>';

  const r = await fetch(`${API}/${id}`).then(res => res.json());
  const ingredients = r.ingredients.split('\n').filter(Boolean);
  const steps       = r.steps.split('\n').filter(Boolean);
  const totalTime   = (r.prep_time||0) + (r.cook_time||0);

  content.innerHTML = `
    ${r.image_url
      ? `<img class="detail-image" src="${r.image_url}" alt="${r.title}" />`
      : `<div class="detail-image-placeholder">${EMOJIS[r.category]||'🍴'}</div>`}
    <div class="modal-body">
      ${r.category ? `<div class="detail-category">${r.category}</div>` : ''}
      <h2 class="detail-title">${r.title}</h2>
      ${r.description ? `<p style="color:var(--muted);margin-bottom:.8rem;font-size:.95rem">${r.description}</p>` : ''}
      <div class="detail-meta">
        ${r.prep_time  ? `<span>🔪 Prep: ${r.prep_time} min</span>` : ''}
        ${r.cook_time  ? `<span>🔥 Cook: ${r.cook_time} min</span>` : ''}
        ${totalTime    ? `<span>⏱ Total: ${totalTime} min</span>` : ''}
        ${r.servings   ? `<span>🍽 ${r.servings} servings</span>` : ''}
        ${r.author     ? `<span>👤 ${r.author}</span>` : ''}
      </div>
      <div class="section-label">Ingredients</div>
      <ul class="ingredients-list">
        ${ingredients.map(i => `<li>${i}</li>`).join('')}
      </ul>
      <div class="section-label">Method</div>
      <ol class="steps-list">
        ${steps.map((s,i) => `<li><div class="step-num">${i+1}</div><div>${s}</div></li>`).join('')}
      </ol>
      <div class="detail-actions">
        <button class="modal-close btn-ghost" onclick="closeDetailModal()">← Back</button>
        <div style="margin-left:auto;display:flex;gap:.6rem">
          <button class="btn-ghost" onclick="openEditModal(${r.id})">✏️ Edit</button>
          <button class="btn-danger" onclick="deleteRecipe(${r.id})">🗑 Delete</button>
        </div>
      </div>
    </div>`;
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

/* ── Form modal ────────────────────────────────────────────────────── */
function openAddModal() {
  editingId = null;
  document.getElementById('form-title').textContent = 'Add a Recipe';
  clearForm();
  document.getElementById('form-modal').classList.add('open');
}

async function openEditModal(id) {
  closeDetailModal();
  editingId = id;
  document.getElementById('form-title').textContent = 'Edit Recipe';
  const r = await fetch(`${API}/${id}`).then(res => res.json());
  document.getElementById('f-title').value       = r.title || '';
  document.getElementById('f-description').value = r.description || '';
  document.getElementById('f-category').value    = r.category || '';
  document.getElementById('f-author').value      = r.author || '';
  document.getElementById('f-prep').value        = r.prep_time || '';
  document.getElementById('f-cook').value        = r.cook_time || '';
  document.getElementById('f-servings').value    = r.servings || '';
  document.getElementById('f-ingredients').value = r.ingredients || '';
  document.getElementById('f-steps').value       = r.steps || '';
  document.getElementById('form-modal').classList.add('open');
}

function closeFormModal() {
  document.getElementById('form-modal').classList.remove('open');
}

function clearForm() {
  ['f-title','f-description','f-category','f-author','f-prep',
   'f-cook','f-servings','f-ingredients','f-steps'].forEach(id => {
    const el = document.getElementById(id);
    el.value = el.tagName === 'SELECT' ? '' : '';
  });
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('f-image').value = '';
}

function previewImage(input) {
  const preview = document.getElementById('upload-preview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

/* ── Submit (create or update) ─────────────────────────────────────── */
async function submitForm() {
  const title       = document.getElementById('f-title').value.trim();
  const ingredients = document.getElementById('f-ingredients').value.trim();
  const steps       = document.getElementById('f-steps').value.trim();
  if (!title || !ingredients || !steps) {
    return showToast('Please fill in Title, Ingredients and Steps', 'error');
  }

  const fd = new FormData();
  fd.append('title',       title);
  fd.append('description', document.getElementById('f-description').value);
  fd.append('category',    document.getElementById('f-category').value);
  fd.append('author',      document.getElementById('f-author').value);
  fd.append('prep_time',   document.getElementById('f-prep').value || 0);
  fd.append('cook_time',   document.getElementById('f-cook').value || 0);
  fd.append('servings',    document.getElementById('f-servings').value || 0);
  fd.append('ingredients', ingredients);
  fd.append('steps',       steps);
  const imageFile = document.getElementById('f-image').files[0];
  if (imageFile) fd.append('image', imageFile);

  const url    = editingId ? `${API}/${editingId}` : `${API}/`;
  const method = editingId ? 'PUT' : 'POST';

  try {
    const res = await fetch(url, { method, body: fd });
    if (!res.ok) throw new Error();
    showToast(editingId ? 'Recipe updated!' : 'Recipe added! 🎉', 'success');
    closeFormModal();
    loadRecipes(activeCategory);
  } catch {
    showToast('Something went wrong. Try again.', 'error');
  }
}

/* ── Delete ────────────────────────────────────────────────────────── */
async function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  await fetch(`${API}/${id}`, { method: 'DELETE' });
  closeDetailModal();
  showToast('Recipe deleted.', 'success');
  loadRecipes(activeCategory);
}

/* ── Category filters ──────────────────────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.category;
    loadRecipes(activeCategory);
  });
});

/* ── Close modals on overlay click ─────────────────────────────────── */
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetailModal();
});
document.getElementById('form-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeFormModal();
});

/* ── Toast notifications ───────────────────────────────────────────── */
function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ── Init ──────────────────────────────────────────────────────────── */
loadRecipes();
</script>
</body>
</html>
